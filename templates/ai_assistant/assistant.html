{% extends "documents/base.html" %}
{% block content %}
<style>
    body {
        background: #f6f7f9;
    }

    .assistant-shell {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        height: calc(100vh - 110px);
        min-height: 620px;
        border: 1px solid #d8dee6;
        background: #fff;
    }

    .assistant-sidebar {
        border-right: 1px solid #d8dee6;
        background: #fbfcfd;
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid #d8dee6;
    }

    .document-list {
        overflow-y: auto;
        padding: 8px;
    }

    .doc-item {
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        background: transparent;
        padding: 10px 12px;
        margin-bottom: 6px;
        border-radius: 8px;
    }

    .doc-item:hover,
    .doc-item.active {
        background: #eef4ff;
        border-color: #c8dafd;
    }

    .doc-title {
        display: block;
        font-weight: 600;
        overflow-wrap: anywhere;
    }

    .assistant-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
    }

    .assistant-toolbar {
        padding: 12px 16px;
        border-bottom: 1px solid #d8dee6;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 22px;
        background: #ffffff;
    }

    .message {
        max-width: 820px;
        margin-bottom: 16px;
        display: flex;
        flex-direction: column;
    }

    .message.user {
        margin-left: auto;
        align-items: flex-end;
    }

    .message.assistant {
        margin-right: auto;
        align-items: flex-start;
    }

    .bubble {
        padding: 12px 14px;
        border-radius: 10px;
        line-height: 1.5;
        overflow-wrap: anywhere;
    }

    .user .bubble {
        background: #0d6efd;
        color: #fff;
    }

    .assistant .bubble {
        background: #f1f3f5;
        color: #1f2933;
    }

    .assistant .bubble p:last-child {
        margin-bottom: 0;
    }

    .message-actions {
        margin-top: 6px;
    }

    .composer {
        border-top: 1px solid #d8dee6;
        padding: 14px;
        background: #fbfcfd;
    }

    .composer form {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    .composer textarea {
        min-height: 52px;
        max-height: 160px;
        resize: vertical;
    }

    .loading-dots span {
        animation: pulse 1.2s infinite;
        display: inline-block;
        font-weight: 700;
    }

    .loading-dots span:nth-child(2) {
        animation-delay: .15s;
    }

    .loading-dots span:nth-child(3) {
        animation-delay: .3s;
    }

    @keyframes pulse {
        0%, 80%, 100% { opacity: .25; }
        40% { opacity: 1; }
    }

    @media (max-width: 900px) {
        .assistant-shell {
            grid-template-columns: 1fr;
            height: auto;
        }

        .assistant-sidebar {
            max-height: 260px;
            border-right: 0;
            border-bottom: 1px solid #d8dee6;
        }

        .assistant-main {
            min-height: 620px;
        }

        .composer form {
            flex-direction: column;
            align-items: stretch;
        }
    }
</style>

<div class="assistant-shell">
    <aside class="assistant-sidebar">
        <div class="sidebar-header">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="mb-0">AI Assistant</h5>
                <span class="badge bg-secondary">{{ documents|length }}</span>
            </div>
            <div class="btn-group w-100" role="group" aria-label="Chat mode">
                <button type="button" class="btn btn-sm btn-primary" id="document-mode-btn">Document</button>
                <button type="button" class="btn btn-sm btn-outline-primary" id="general-mode-btn">General</button>
            </div>
        </div>
        <div class="document-list" id="document-list">
            {% for doc in documents %}
                <button class="doc-item" type="button" data-document-id="{{ doc.pk }}" data-document-title="{{ doc.title|escape }}">
                    <span class="doc-title">{{ doc.title }}</span>
                    <span class="text-muted small">{{ doc.file_type|upper }} · {{ doc.uploaded_at|date:"d M Y, H:i" }}</span>
                </button>
            {% empty %}
                <div class="text-muted small p-3">
                    No processed documents yet. Upload and process a document first.
                </div>
            {% endfor %}
        </div>
    </aside>

    <main class="assistant-main">
        <div class="assistant-toolbar">
            <div>
                <h5 class="mb-0" id="chat-title">Select a document</h5>
                <div class="text-muted small" id="chat-subtitle">Ask questions from OCR text only.</div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <select class="form-select form-select-sm" id="summary-type" style="width: 170px;">
                    <option value="short">Short summary</option>
                    <option value="detailed">Detailed summary</option>
                    <option value="bullets">Bullet points</option>
                    <option value="takeaways">Key takeaways</option>
                </select>
                <button class="btn btn-sm btn-outline-secondary" type="button" id="summarize-btn">Summarize</button>
                <button class="btn btn-sm btn-outline-danger" type="button" id="clear-chat-btn">Clear chat</button>
            </div>
        </div>

        <section class="chat-messages" id="chat-messages" aria-live="polite"></section>

        <div class="composer">
            <form id="chat-form">
                <textarea class="form-control" id="message-input" placeholder="Ask a question..." required></textarea>
                <button class="btn btn-primary px-4" type="submit" id="send-btn">Send</button>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
<script>
const state = {
    mode: 'document',
    documentId: null,
    documentTitle: '',
    loading: false,
};

const chatMessages = document.getElementById('chat-messages');
const chatTitle = document.getElementById('chat-title');
const chatSubtitle = document.getElementById('chat-subtitle');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const summarizeBtn = document.getElementById('summarize-btn');
const summaryType = document.getElementById('summary-type');
const documentModeBtn = document.getElementById('document-mode-btn');
const generalModeBtn = document.getElementById('general-mode-btn');

function csrfToken() {
    const match = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : '';
}

function renderMarkdown(text) {
    return DOMPurify.sanitize(marked.parse(text || ''));
}

function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addMessage(role, content) {
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'assistant' ? renderMarkdown(content) : content.replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
    }[char]));
    wrapper.appendChild(bubble);

    if (role === 'assistant') {
        const actions = document.createElement('div');
        actions.className = 'message-actions';
        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn btn-sm btn-outline-secondary';
        copyBtn.type = 'button';
        copyBtn.textContent = 'Copy';
        copyBtn.addEventListener('click', async () => {
            await navigator.clipboard.writeText(content);
            copyBtn.textContent = 'Copied';
            setTimeout(() => copyBtn.textContent = 'Copy', 1200);
        });
        actions.appendChild(copyBtn);
        wrapper.appendChild(actions);
    }

    chatMessages.appendChild(wrapper);
    scrollToBottom();
}

function addLoading() {
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    wrapper.id = 'loading-message';
    wrapper.innerHTML = '<div class="bubble loading-dots"><span>.</span><span>.</span><span>.</span></div>';
    chatMessages.appendChild(wrapper);
    scrollToBottom();
}

function removeLoading() {
    document.getElementById('loading-message')?.remove();
}

function setLoading(value) {
    state.loading = value;
    sendBtn.disabled = value;
    summarizeBtn.disabled = value || state.mode !== 'document' || !state.documentId;
    if (value) {
        addLoading();
    } else {
        removeLoading();
    }
}

function showEmptyMessage() {
    chatMessages.innerHTML = '';
    if (state.mode === 'document' && !state.documentId) {
        addMessage('assistant', 'Select a processed document from the sidebar to chat with its OCR text.');
    } else if (state.mode === 'general') {
        addMessage('assistant', 'Ask anything. This mode does not use document context.');
    }
}

async function requestJson(url, options = {}) {
    const response = await fetch(url, {
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken(),
            ...(options.headers || {}),
        },
        ...options,
    });
    const data = await response.json();
    if (!response.ok) {
        throw new Error(data.error || 'Request failed.');
    }
    return data;
}

async function loadHistory() {
    if (state.mode === 'document' && !state.documentId) {
        showEmptyMessage();
        return;
    }

    const params = new URLSearchParams({ mode: state.mode });
    if (state.documentId) {
        params.set('document_id', state.documentId);
    }

    const data = await requestJson(`/ai/history/?${params.toString()}`, {
        method: 'GET',
        headers: {},
    });

    chatMessages.innerHTML = '';
    if (!data.history.length) {
        showEmptyMessage();
        return;
    }
    data.history.forEach(item => addMessage(item.role, item.content));
}

function updateHeader() {
    if (state.mode === 'document') {
        chatTitle.textContent = state.documentTitle || 'Select a document';
        chatSubtitle.textContent = 'Answers are restricted to selected OCR text.';
        messageInput.placeholder = 'Ask a question about the selected document...';
        summaryType.disabled = false;
    } else {
        chatTitle.textContent = 'General AI Chat';
        chatSubtitle.textContent = 'No document context is used.';
        messageInput.placeholder = 'Ask anything...';
        summaryType.disabled = true;
    }
    summarizeBtn.disabled = state.mode !== 'document' || !state.documentId;
}

function setMode(mode) {
    state.mode = mode;
    documentModeBtn.className = mode === 'document' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline-primary';
    generalModeBtn.className = mode === 'general' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline-primary';
    updateHeader();
    loadHistory().catch(error => addMessage('assistant', error.message));
}

document.querySelectorAll('.doc-item').forEach(button => {
    button.addEventListener('click', () => {
        document.querySelectorAll('.doc-item').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        state.documentId = button.dataset.documentId;
        state.documentTitle = button.dataset.documentTitle;
        if (state.mode !== 'document') {
            setMode('document');
        } else {
            updateHeader();
            loadHistory().catch(error => addMessage('assistant', error.message));
        }
    });
});

documentModeBtn.addEventListener('click', () => setMode('document'));
generalModeBtn.addEventListener('click', () => setMode('general'));

document.getElementById('chat-form').addEventListener('submit', async event => {
    event.preventDefault();
    const message = messageInput.value.trim();
    if (!message || state.loading) {
        return;
    }
    if (state.mode === 'document' && !state.documentId) {
        addMessage('assistant', 'Select a document first.');
        return;
    }

    messageInput.value = '';
    addMessage('user', message);
    setLoading(true);
    try {
        const data = await requestJson('/ai/chat/', {
            method: 'POST',
            body: JSON.stringify({
                mode: state.mode,
                document_id: state.documentId,
                message,
            }),
        });
        addMessage('assistant', data.answer);
    } catch (error) {
        addMessage('assistant', error.message);
    } finally {
        setLoading(false);
    }
});

summarizeBtn.addEventListener('click', async () => {
    if (!state.documentId || state.loading) {
        return;
    }
    setLoading(true);
    try {
        const data = await requestJson('/ai/summarize/', {
            method: 'POST',
            body: JSON.stringify({
                document_id: state.documentId,
                summary_type: summaryType.value,
            }),
        });
        addMessage('assistant', data.summary);
    } catch (error) {
        addMessage('assistant', error.message);
    } finally {
        setLoading(false);
    }
});

document.getElementById('clear-chat-btn').addEventListener('click', async () => {
    if (state.mode === 'document' && !state.documentId) {
        return;
    }
    await requestJson('/ai/clear/', {
        method: 'POST',
        body: JSON.stringify({
            mode: state.mode,
            document_id: state.documentId,
        }),
    });
    showEmptyMessage();
});

updateHeader();
showEmptyMessage();
</script>
{% endblock %}
