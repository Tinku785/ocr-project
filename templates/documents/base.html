<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCR System - IOCL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">OCR SYSTEM - IOCL</a>
    <div class="d-flex gap-3 align-items-center">
        {% if user.is_authenticated %}
            <a class="nav-link text-white" href="/">Dashboard</a>
            <a class="nav-link text-white" href="/upload/">Upload</a>
            <a class="nav-link text-white" href="/search/">Search</a>
            <a class="nav-link text-white" href="/ai/">AI Assistant</a>
            <span class="text-white-50 small">| {{ user.username }}</span>
            <form method="post" action="/logout/" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="nav-link text-white bg-transparent border-0 p-0">Logout</button>
            </form>
        {% else %}
        <a class="nav-link text-white" href="/login/">Login</a>
        {% endif %} 
    </div>
</nav>
<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
